<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        .container {
            width: 400px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        h2 {
            text-align: center;
        }

        label {
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin: 5px 0 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .gender, .skills {
            margin-bottom: 15px;
        }

        .buttons {
            text-align: center;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        .reset {
            background-color: red;
        }

        .reset:hover {
            background-color: darkred;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Student Form</h2>

    <form>
        <!-- Name -->
        <label>Full Name:</label>
        <input type="text" placeholder="Enter your name" required>

        <!-- Email -->
        <label>Email:</label>
        <input type="email" placeholder="Enter your email" required>

        <!-- Gender -->
        <div class="gender">
            <label>Gender:</label><br>
            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female
        </div>

        <!-- Course Selector -->
        <label>Select Course:</label>
        <select>
            <option>B.Tech</option>
            <option>BCA</option>
            <option>BBA</option>
            <option>MCA</option>
        </select>

        <!-- Skills -->
        <div class="skills">
            <label>Skills:</label><br>
            <input type="checkbox"> HTML
            <input type="checkbox"> CSS
            <input type="checkbox"> JavaScript
        </div>

        <!-- Buttons -->
        <div class="buttons">
            <button type="submit">Submit</button>
            <button type="reset" class="reset">Reset</button>
        </div>
    </form>
</div>

</body>
</html>
